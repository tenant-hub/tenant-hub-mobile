server {
    listen 5174;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter entry points: never cache so CDN always fetches fresh content
    location ~* ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|manifest\.json|version\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # Compiled Flutter app and assets: cache busted by Cloudflare on each deploy
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
